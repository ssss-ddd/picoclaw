name: build-picoclaw-armv7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: build armv7
        run: |
          export GOOS=linux
          export GOARCH=arm
          export GOARM=7
          export CGO_ENABLED=0

          go build -o picoclaw-armv7

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-armv7
          path: picoclaw-armv7
