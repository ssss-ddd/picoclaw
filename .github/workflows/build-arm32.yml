name: Build ARM32 Termux (Ultimate Version)
on: 
  push:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 拉取代码
      uses: actions/checkout@v4

    - name: 2. 配置 Go 环境
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        cache: false

    - name: 3. 修复环境并进行终极编译
      run: |
        # 修复暗坑 2：强制找回丢失的 workspace 文件夹，防止 go:embed 报错
        mkdir -p cmd/picoclaw/internal/onboard/workspace
        touch cmd/picoclaw/internal/onboard/workspace/.gitkeep
        
        # 如果根目录下有默认配置，兜底拷贝一份进去
        if [ -d "workspace" ]; then 
          cp -r workspace/* cmd/picoclaw/internal/onboard/workspace/ 2>/dev/null || true
        fi

        # 下载所有依赖包
        go mod download
        
        # 修复暗坑 1：加入 -tags "goolm,stdjson" 绕过 C 语言加密库，实现纯 Go 交叉编译
        CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -tags "goolm,stdjson" -trimpath -ldflags="-s -w" -o picoclaw-arm32 ./cmd/picoclaw
        
        chmod +x picoclaw-arm32

    # ================= 下面是 4 种获取文件的不同方式 =================

    - name: 【拿文件方式 1】上传到 GitHub Artifacts (常规压缩包)
      uses: actions/upload-artifact@v4
      with:
        name: picoclaw-arm32-Artifact
        path: picoclaw-arm32

    - name: 【拿文件方式 2】自动生成 GitHub Release (直接下载链接)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: arm32-latest
        name: Termux 32-bit 专属编译版
        body: "包含 CGO libolm 和 workspace 修复的纯正 32 位 Android Termux 可执行文件。"
        files: picoclaw-arm32
        make_latest: true

    - name: 【拿文件方式 3】直接把文件存进代码库的独立分支 (bin-output)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git checkout --orphan bin-output
        git rm -rf .
        git add picoclaw-arm32 -f
        git commit -m "Auto update ARM32 binary"
        git push origin bin-output -f

    - name: 【拿文件方式 4】上传到免费公共网盘 (在日志里给你提取链接)
      run: |
        echo "正在上传到 bashupload 临时网盘..."
        URL=$(curl -s --upload-file picoclaw-arm32 https://bashupload.com/picoclaw-arm32)
        echo "================================================="
        echo "手机端最快下载方法，请复制以下链接到浏览器打开："
        echo "$URL"
        echo "================================================="
